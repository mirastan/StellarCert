name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      contracts: ${{ steps.filter.outputs.contracts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'frontend/**'
            backend:
              - 'backend/**'
            contracts:
              - 'stellar-contracts/**'

    frontend:
     needs: changes
     if: needs.changes.outputs.frontend == 'true'
     runs-on: ubuntu-latest
     defaults:
       run:
         working-directory: frontend
     steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-node@v4
         with:
           node-version: 20
           cache: npm
           cache-dependency-path: |
             package-lock.json
             frontend/package-lock.json
       - name: Install frontend dependencies
         run: npm ci
       - name: Check frontend environment variables
         run: |
           node -e "
           const required = ['VITE_API_URL'];
           const missing = required.filter(key => !process.env[key]);
           if (missing.length) {
             console.error('Missing required environment variables:', missing.join(', '));
             process.exit(1);
           }
           "
       - name: Build frontend
         run: npm run build

   backend:
     needs: changes
     if: needs.changes.outputs.backend == 'true'
     runs-on: ubuntu-latest
     defaults:
       run:
         working-directory: backend
     steps:
       - uses: actions/checkout@v4
       - uses: actions/setup-node@v4
         with:
           node-version: 20
           cache: npm
           cache-dependency-path: |
             package-lock.json
             backend/package-lock.json
       - name: Install backend dependencies
         run: npm ci
       - name: Validate backend environment
         run: |
           node -e "
           const required = ['STELLAR_ISSUER_SECRET_KEY', 'STELLAR_ISSUER_PUBLIC_KEY'];
           const missing = required.filter(key => !process.env[key]);
           if (missing.length) {
             console.error('Missing required environment variables:', missing.join(', '));
             process.exit(1);
           }
           "
       - name: Typecheck backend
         run: npm run typecheck
       - name: Build backend
         run: npm run build

  contracts:
    needs: changes
    if: needs.changes.outputs.contracts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: stellar-contracts
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: stellar-contracts
      - name: Build contracts
        run: cargo build
      - name: Test contracts
        run: cargo test
